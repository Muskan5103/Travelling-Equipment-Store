{% extends "store/base.html" %}

{% block content %}
<div class="order-success-bg">
<div class="container py-5">
  <div class="order-success-card text-center">

    <div class="success-icon">✅</div>

    <h2>Order Placed Successfully!</h2>

    <p class="text-muted mt-2">
      Thank you for shopping with <strong>Trek Ready</strong>.
      Your order will be delivered soon.
    </p>
<p class="order-status">
  Order Status:
  <strong class="status-badge {{ order.status }}">

</p>
<a href="{% url 'download_invoice' order.id %}"
   class="btn btn-outline-primary mt-3  invoice-btn">
  Download Invoice
</a>

    <a href="{% url 'home' %}" class="btn btn-primary mt-4">
      Continue Shopping
    </a>
    



  </div>
</div>
</div>
