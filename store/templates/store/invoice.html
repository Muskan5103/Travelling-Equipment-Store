<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #333;
    }

    .invoice-box {
      width: 100%;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .details {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table th {
      background: #f2f2f2;
      padding: 8px;
      text-align: left;
    }

    table td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    .total {
      text-align: right;
      font-weight: bold;
      margin-top: 15px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="invoice-box">
    <h1>INVOICE</h1>

    <div class="details">
      <p><strong>Order ID:</strong> {{ order.id }}</p>
      <p><strong>Customer:</strong> {{ order.user.username }}</p>
      <p><strong>Address:</strong> {{ order.address }}</p>
    </div>

    <table>
      <tr>
        <th>Product</th>
        <th>Qty</th>
        <th>Price</th>
      </tr>
      {% for item in items %}
      <tr>
        <td>{{ item.variant.product.name }}</td>
        <td>{{ item.quantity }}</td>
        <td>₹ {{ item.price }}</td>
      </tr>
      {% endfor %}
    </table>

    <div class="total">
      Total Amount: ₹ {{ order.total_amount }}
    </div>
  </div>
</body>
</html>
