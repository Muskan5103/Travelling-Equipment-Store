

{% extends "store/base.html" %}

{% block title %}Stock In{% endblock %}

{% block content %}

<div class="container bii mtt-4">

    <div class="card shadow-sm mx-auto stock-card">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">📦 Stock In</h4>
        </div>

        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Product</label>
                    <select name="product" class="form-select" required>
                        {% for product in products %}
                        <option value="{{ product.id }}">
                            {{ product.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Quantity</label>
                    <input type="number"
                           name="quantity"
                           class="form-control"
                           min="1"
                           required>
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit"
                            class="btn btn-success">
                        ➕ Add Stock
                    </button>

                    <a href="{% url 'warehouse_dashboard' %}"
                       class="btn btn-secondary">
                        ← Back
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
