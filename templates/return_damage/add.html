{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Return / Damage Record</title>
    <link rel="stylesheet" href="{% static 'css/return_damage.css' %}">
</head>
<body>

<div class="container">

    <div class="form-wrapper">
        <h2>Add Return / Damage Record</h2>

        <form method="POST" class="custom-form">
            {% csrf_token %}

            <div class="form-group">
                <label>Equipment</label>
                {{ form.product }}

            </div>

            <div class="form-group">
                <label>Customer Name</label>
                {{ form.customer_name }}
            </div>

            <div class="form-group">
                <label>Quantity</label>
                {{ form.quantity }}
            </div>

            <div class="form-group">
                <label>Status</label>
                {{ form.status }}
            </div>

            <div class="form-group">
                <label>Damage Description</label>
                {{ form.damage_description }}
            </div>

            <div class="form-group">
                <label>Action Status</label>
                {{ form.action_status }}
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-save">Save Record</button>
                <a href="{% url 'return_damage_list' %}" class="btn-back">Back</a>
            </div>
        </form>
    </div>

</div>

</body>
</html>
