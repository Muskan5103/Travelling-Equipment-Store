{% extends "warehouse/base.html" %}
{% block content %}

<div class="container mt-5">
    <h3>📦 Scan Product to Add Stock</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Scan QR Code</label>
            <input type="text" name="variant_id" class="form-control" placeholder="Scan QR here" autofocus>
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" name="quantity" value="1" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">
            Add Stock
        </button>
    </form>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info mt-3">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
</div>

{% endblock %}
